---
name: Lint

permissions:
  contents: read

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Markdown
  # ============================================================
  markdown-lint:
    name: Markdown Lint (markdownlint-cli2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"
          config: ".lintrc/docs/markdown/.markdownlint.json"

  # ============================================================
  # YAML
  # ============================================================
  yaml-lint:
    name: YAML Lint (yamllint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Run yamllint
        run: |
          find . \( -name "*.yml" -o -name "*.yaml" \) \
            ! -path "./.git/*" \
            | grep -v "node_modules\|src-tauri/target\|dist" \
            | xargs yamllint --config-file .lintrc/general/.yamllint.yml

  # ============================================================
  # TOML
  # ============================================================
  toml-lint:
    name: TOML Lint (taplo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install taplo
        run: |
          TAPLO_VER="0.9.3"
          curl -fsSL \
            "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VER}/taplo-linux-x86_64.gz" \
            | gzip -d > /usr/local/bin/taplo \
            && chmod +x /usr/local/bin/taplo

      - name: Run taplo format check
        run: |
          find . -name "*.toml" \
            ! -path "./.git/*" \
            ! -path "./src-tauri/target/*" \
            | xargs taplo fmt --check \
                --config .lintrc/data-formats/toml/taplo.toml

  # ============================================================
  # TypeScript / React
  # ============================================================
  typescript-lint:
    name: TypeScript Lint (ESLint + Prettier + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install project dependencies
        run: yarn install --frozen-lockfile

      - name: Install lint tools
        run: |
          npm install --no-save --no-package-lock \
            eslint@8 \
            @typescript-eslint/eslint-plugin@7 \
            @typescript-eslint/parser@7 \
            eslint-plugin-import@2 \
            eslint-import-resolver-typescript@3 \
            eslint-plugin-unicorn@52 \
            eslint-plugin-sonarjs@0.25 \
            eslint-plugin-security@2 \
            eslint-plugin-promise@6 \
            eslint-plugin-react@7 \
            eslint-plugin-react-hooks@4 \
            eslint-plugin-jsx-a11y@6 \
            eslint-plugin-jsdoc@48 \
            prettier@3

      - name: Prettier — format check
        run: |
          npx prettier \
            --config .lintrc/frontend/prettier/.prettierrc \
            --check \
            --ignore-path .gitignore \
            "src/**/*.{ts,tsx}"

      - name: ESLint — static analysis
        run: |
          npx eslint \
            --max-warnings 0 \
            --config .lintrc/frontend/typescript/.eslintrc-ts.json \
            "src/**/*.{ts,tsx}"

      - name: TypeScript — type check
        run: npx tsc --noEmit

  # ============================================================
  # CSS
  # ============================================================
  stylelint-lint:
    name: CSS Lint (Stylelint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install project dependencies
        run: yarn install --frozen-lockfile

      - name: Install stylelint
        run: |
          npm install --no-save --no-package-lock \
            stylelint@16 \
            stylelint-config-standard@36 \
            stylelint-config-recess-order@5 \
            stylelint-config-tailwindcss@0.0.7

      - name: Run stylelint
        run: |
          npx stylelint \
            --config .lintrc/frontend/css-styles/.stylelintrc.json \
            "src/**/*.css"

  # ============================================================
  # Rust
  # ============================================================
  rust-lint:
    name: Rust Lint (clippy + rustfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Rust format check
        working-directory: src-tauri
        run: |
          cp ../.lintrc/backend/rust/rustfmt.toml .
          cargo fmt --all -- --check

      - name: Clippy
        working-directory: src-tauri
        run: |
          cp ../.lintrc/backend/rust/.clippy.toml .
          cargo clippy --all-targets -- -D warnings

  # ============================================================
  # Shell (bash)
  # ============================================================
  shell-lint:
    name: Shell Lint (ShellCheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: "--rcfile .lintrc/infrastructure/shell/.shellcheckrc"
        with:
          severity: style
          scandir: "."

  # ============================================================
  # React Doctor
  # ============================================================
  react-doctor:
    name: React Doctor (code quality scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run React Doctor
        uses: millionco/react-doctor@v0
        with:
          directory: src
          diff: ${{ github.base_ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          annotations: "true"
          fail-on: "warning"
          verbose: "true"

  # ============================================================
  # PowerShell
  # ============================================================
  powershell-lint:
    name: PowerShell Lint (PSScriptAnalyzer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer `
            -Path scripts/ `
            -Settings .lintrc/infrastructure/shell/PSScriptAnalyzerSettings.psd1 `
            -Recurse
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }

  # ============================================================
  # Secret scanning
  # ============================================================
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .lintrc/security/.gitleaks.toml

  # ============================================================
  # Semgrep security scan
  # ============================================================
  semgrep-scan:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep \
            --config .lintrc/security/.semgrep.yml \
            --config p/owasp-top-ten \
            --config p/secrets \
            --error \
            --no-rewrite-rule-ids \
            src/ src-tauri/src/

  # ============================================================
  # Commit message
  # ============================================================
  commitlint-lint:
    name: Commitlint (Commit Message)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install commitlint
        run: |
          npm install --no-package-lock \
            @commitlint/cli@19.6.0 \
            @commitlint/config-conventional@19.6.0 \
            conventional-changelog-conventionalcommits@8.0.0

      - name: Lint commits
        run: |
          npx commitlint \
            --config .lintrc/git/.commitlintrc.cjs \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose

  # ============================================================
  # Spelling
  # ============================================================
  cspell-lint:
    name: CSpell (Spelling Check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install cspell
        run: npm install -g cspell@8.17.1

      - name: Run cspell
        run: |
          cspell lint \
            --config .lintrc/general/cspell.json \
            --no-progress \
            --no-summary \
            --gitignore \
            --exclude ".lintrc/**" \
            --exclude "src-tauri/target/**" \
            "**"

  # ============================================================
  # Dead code / unused deps
  # ============================================================
  knip-lint:
    name: Knip (Dead Code Detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install knip
        run: npm install -g knip@5.38.0

      - name: Run knip
        run: |
          knip \
            --config .lintrc/frontend/knip.json \
            --no-progress

  # ============================================================
  # File naming
  # ============================================================
  ls-lint:
    name: ls-lint (File Naming)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ls-lint
        run: |
          LS_LINT_VER="2.3.1"
          curl -sL \
            "https://github.com/loeffel-io/ls-lint/releases/download/v${LS_LINT_VER}/ls-lint-linux-amd64" \
            -o /usr/local/bin/ls-lint \
            && chmod +x /usr/local/bin/ls-lint

      - name: Run ls-lint
        run: ls-lint --config .lintrc/general/.ls-lint.yml

  # ============================================================
  # Summary gate — used as the single required status check
  # ============================================================
  all-checks:
    name: All Lint Checks Passed
    if: always()
    needs:
      - markdown-lint
      - yaml-lint
      - toml-lint
      - typescript-lint
      - stylelint-lint
      - rust-lint
      - shell-lint
      - react-doctor
      - powershell-lint
      - secret-scan
      - semgrep-scan
      - commitlint-lint
      - cspell-lint
      - knip-lint
      - ls-lint
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE '"failure"|"cancelled"'; then
            echo "One or more jobs failed or were cancelled."
            exit 1
          fi
          echo "All jobs passed (or were skipped)."
