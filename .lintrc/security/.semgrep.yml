# Semgrep 安全扫描配置 — 覆盖 OWASP Top 10 2021
# 适用语言：TypeScript / JavaScript（React 前端）+ Rust（Tauri 后端）
# Run with: semgrep --config .lintrc/security/.semgrep.yml \
#                   --config p/owasp-top-ten \
#                   --config p/secrets \
#                   --config p/security-audit \
#                   --config p/typescript \
#                   --config p/rust

---
rules:
  # ============================================================
  # A01: Broken Access Control
  # ============================================================
  - id: no-hardcoded-admin-bypass
    pattern-either:
      - pattern: if ($USER == "admin")
      - pattern: if ($ROLE == "admin")
      - pattern: if ($USER === "admin")
      - pattern: if ($ROLE === "admin")
    message: "Hardcoded role check detected. Use RBAC/ABAC via authorization middleware."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-284: Improper Access Control"
      owasp: "A01:2021 - Broken Access Control"

  - id: path-traversal
    pattern-either:
      - pattern: path.join($BASE, $USER_INPUT)
      - pattern: path.resolve($BASE, $USER_INPUT)
    message: "Possible path traversal. Sanitize and validate file paths with allowlists."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-22: Path Traversal"
      owasp: "A01:2021 - Broken Access Control"

  - id: rust-path-traversal
    pattern-either:
      - pattern: std::fs::read($USER_INPUT)
      - pattern: std::fs::write($USER_INPUT, ...)
      - pattern: std::fs::remove_file($USER_INPUT)
      - pattern: PathBuf::from($USER_INPUT)
    message: "Possible path traversal with user-controlled input. Canonicalize and validate paths against an allowlist."
    languages: [rust]
    severity: ERROR
    metadata:
      cwe: "CWE-22: Path Traversal"
      owasp: "A01:2021 - Broken Access Control"

  - id: tauri-shell-open-user-input
    pattern: opener::open($USER_INPUT)
    message: "Opening user-controlled URLs via shell can enable URL scheme abuse. Validate and allowlist URLs."
    languages: [rust]
    severity: ERROR
    metadata:
      cwe: "CWE-601: URL Redirection to Untrusted Site"
      owasp: "A01:2021 - Broken Access Control"

  # ============================================================
  # A02: Cryptographic Failures
  # ============================================================
  - id: no-hardcoded-credentials
    pattern-either:
      - pattern: const password = "..."
      - pattern: let password = "..."
      - pattern: const secret = "..."
      - pattern: const apiKey = "..."
      - pattern: const api_key = "..."
      - pattern: const accessToken = "..."
      - pattern: const privateKey = "..."
      - pattern: const PASSWORD = "..."
      - pattern: const SECRET_KEY = "..."
    message: "Hardcoded credential detected. Use environment variables or a secrets manager."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A02:2021 - Cryptographic Failures"

  - id: rust-hardcoded-credentials
    pattern-either:
      - pattern: let password = "..."
      - pattern: const PASSWORD: &str = "..."
      - pattern: let secret = "..."
      - pattern: let api_key = "..."
      - pattern: let access_token = "..."
    message: "Hardcoded credential in Rust code. Use environment variables or a secrets manager."
    languages: [rust]
    severity: ERROR
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A02:2021 - Cryptographic Failures"

  - id: insecure-random
    pattern: Math.random()
    message: "Math.random() is not cryptographically secure. Use crypto.getRandomValues() for security-sensitive operations."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-338: Use of Cryptographically Weak Pseudo-Random Number Generator"
      owasp: "A02:2021 - Cryptographic Failures"

  - id: hardcoded-iv
    pattern-either:
      - pattern: const iv = "..."
      - pattern: let iv = "..."
      - pattern: const IV = "..."
    message: "Hardcoded IV/nonce detected. Generate a random IV using crypto.getRandomValues() for each encryption operation."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-330: Use of Insufficiently Random Values"
      owasp: "A02:2021 - Cryptographic Failures"

  # ============================================================
  # A03: Injection
  # ============================================================
  - id: no-sql-string-concat
    pattern-either:
      - pattern: $QUERY = "SELECT" + $USER_INPUT
      - pattern: $QUERY = "INSERT" + $USER_INPUT
      - pattern: $QUERY = "UPDATE" + $USER_INPUT
      - pattern: $QUERY = "DELETE" + $USER_INPUT
    message: "Possible SQL injection via string concatenation. Use parameterized queries."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-89: SQL Injection"
      owasp: "A03:2021 - Injection"

  - id: no-os-command-injection
    pattern-either:
      - pattern: exec($USER_INPUT)
      - pattern: execSync($USER_INPUT)
      - pattern: spawn($USER_INPUT)
      - pattern: spawnSync($USER_INPUT)
    message: "Possible OS command injection. Validate and allowlist command inputs."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-78: OS Command Injection"
      owasp: "A03:2021 - Injection"

  - id: rust-command-injection
    pattern-either:
      - pattern: std::process::Command::new($USER_INPUT)
      - pattern: Command::new($USER_INPUT)
    message: "Possible command injection via user-controlled input. Validate or allowlist command names."
    languages: [rust]
    severity: ERROR
    metadata:
      cwe: "CWE-78: OS Command Injection"
      owasp: "A03:2021 - Injection"

  - id: no-eval-user-input
    pattern-either:
      - pattern: eval($X)
      - pattern: new Function($X)
      - pattern: setTimeout($X, $T)
      - pattern: setInterval($X, $T)
    message: "Avoid eval(), new Function(), and string-based setTimeout/setInterval — potential code injection."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
      owasp: "A03:2021 - Injection"

  - id: no-innerhtml-xss
    pattern-either:
      - pattern: $EL.innerHTML = $VAL
      - pattern: $EL.outerHTML = $VAL
      - pattern: document.write($VAL)
      - pattern: document.writeln($VAL)
    message: "Direct innerHTML/outerHTML or document.write() can cause XSS. Use textContent or DOM APIs."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-79: Cross-site Scripting"
      owasp: "A03:2021 - Injection"

  - id: react-dangerous-innerhtml
    pattern: <$EL dangerouslySetInnerHTML={...} />
    message: "dangerouslySetInnerHTML can cause XSS. Sanitize content with DOMPurify before rendering."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-79: Cross-site Scripting"
      owasp: "A03:2021 - Injection"

  - id: rust-unsafe-block
    pattern: unsafe { ... }
    message: "Unsafe Rust block detected. Add a '// SAFETY:' comment explaining invariants upheld."
    languages: [rust]
    severity: WARNING
    metadata:
      cwe: "CWE-119: Improper Restriction of Operations within the Bounds of a Memory Buffer"
      owasp: "A03:2021 - Injection"

  - id: rust-mem-transmute
    pattern: std::mem::transmute(...)
    message: "mem::transmute is unsound and can cause undefined behavior. Use safe conversion methods."
    languages: [rust]
    severity: ERROR
    metadata:
      cwe: "CWE-704: Incorrect Type Conversion or Cast"
      owasp: "A03:2021 - Injection"

  # ============================================================
  # A04: Insecure Design
  # ============================================================
  - id: localstorage-sensitive-data
    pattern-either:
      - pattern: localStorage.setItem("token", $VAL)
      - pattern: localStorage.setItem("password", $VAL)
      - pattern: localStorage.setItem("secret", $VAL)
      - pattern: sessionStorage.setItem("token", $VAL)
      - pattern: sessionStorage.setItem("password", $VAL)
    message: "Storing sensitive data in localStorage/sessionStorage is insecure. Use secure HTTP-only cookies or in-memory storage."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-922: Insecure Storage of Sensitive Information"
      owasp: "A04:2021 - Insecure Design"

  # ============================================================
  # A05: Security Misconfiguration
  # ============================================================
  - id: debug-mode-enabled
    pattern-either:
      - pattern: debug=true
      - pattern: DEBUG=true
    message: "Debug mode must be disabled in production environments."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-489: Active Debug Code"
      owasp: "A05:2021 - Security Misconfiguration"

  - id: insecure-cors-wildcard
    pattern-either:
      - pattern: 'cors({ origin: "*" })'
      - pattern: '"Access-Control-Allow-Origin": "*"'
    message: "Wildcard CORS policy exposes APIs to any origin. Specify allowed origins explicitly."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-942: Permissive Cross-domain Policy"
      owasp: "A05:2021 - Security Misconfiguration"

  - id: insecure-http-request
    pattern-either:
      - pattern: fetch("http://...")
      - pattern: axios.get("http://...")
      - pattern: axios.post("http://...")
    message: "HTTP (non-TLS) request detected. Use HTTPS to protect data in transit."
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-319: Cleartext Transmission of Sensitive Information"
      owasp: "A05:2021 - Security Misconfiguration"

  - id: postmessage-no-origin-check
    pattern: window.addEventListener("message", $HANDLER)
    message: "postMessage listener without origin validation. Always check event.origin before processing messages."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-346: Origin Validation Error"
      owasp: "A05:2021 - Security Misconfiguration"

  # ============================================================
  # A07: Identification and Authentication Failures
  # ============================================================
  - id: insecure-cookie-no-secure-flag
    pattern: res.cookie($NAME, $VAL)
    message: "Cookie missing Secure, HttpOnly, and SameSite flags. Set all three for sensitive cookies."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-614: Sensitive Cookie Without 'Secure' Attribute"
      owasp: "A07:2021 - Identification and Authentication Failures"

  - id: weak-jwt-algorithm
    pattern-either:
      - pattern: jwt.sign($PAYLOAD, $SECRET, { algorithm: "HS256" })
      - pattern: jwt.sign($PAYLOAD, $SECRET, { algorithm: "HS384" })
      - pattern: jwt.sign($PAYLOAD, $SECRET, { algorithm: "none" })
    message: "Weak or insecure JWT algorithm. Prefer RS256/ES256 (asymmetric) over symmetric HMAC or 'none'."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp: "A07:2021 - Identification and Authentication Failures"

  # ============================================================
  # A09: Security Logging and Monitoring Failures
  # ============================================================
  - id: no-password-in-log
    pattern-either:
      - pattern: console.log("... password ...")
      - pattern: console.log("... token ...")
      - pattern: console.log("... secret ...")
    message: "Possible credential exposure in logs. Never log passwords, tokens, or secrets."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"
      owasp: "A09:2021 - Security Logging and Monitoring Failures"

  # ============================================================
  # A10: Server-Side Request Forgery (SSRF)
  # ============================================================
  - id: ssrf-user-controlled-url
    pattern-either:
      - pattern: fetch($USER_INPUT)
      - pattern: axios.get($USER_INPUT)
      - pattern: axios.post($USER_INPUT, ...)
    message: "Possible SSRF. Validate and allowlist URLs before making outbound HTTP requests."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-918: Server-Side Request Forgery"
      owasp: "A10:2021 - Server-Side Request Forgery"

  # ============================================================
  # Rust / Tauri — 后端专项规则
  # ============================================================
  - id: rust-no-unwrap
    pattern-either:
      - pattern: $X.unwrap()
      - pattern: $X.expect($MSG)
    message: "Avoid unwrap()/expect() in production Rust code. Use '?' or proper error handling."
    languages: [rust]
    severity: ERROR
    paths:
      exclude:
        - "**/tests/**"
        - "**/*_test.rs"
        - "**/test_*.rs"
    metadata:
      cwe: "CWE-248: Uncaught Exception"
      owasp: "A05:2021 - Security Misconfiguration"

  - id: rust-mem-forget
    pattern: std::mem::forget(...)
    message: "mem::forget can cause resource leaks. Use ManuallyDrop or RAII patterns instead."
    languages: [rust]
    severity: WARNING
    metadata:
      cwe: "CWE-401: Missing Release of Memory after Effective Lifetime"
      owasp: "A05:2021 - Security Misconfiguration"
