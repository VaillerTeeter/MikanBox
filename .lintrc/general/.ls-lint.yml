---
# ls-lint 配置 — 文件命名规范（针对 MikanBox 项目）
# 文档：https://ls-lint.org/2.x/configuration/the-rules.html
# 用法：ls-lint --config .lintrc/general/.ls-lint.yml

ls:
  # ============================================================
  # 默认全局规则
  # ============================================================
  .default:
    .ts: kebab-case | camelCase
    .tsx: PascalCase | camelCase
    .css: kebab-case | camelCase
    .json: kebab-case | camelCase
    .yaml: kebab-case | regex:[A-Z._-]+
    .yml: kebab-case | regex:[A-Z._-]+
    .md: SCREAMING_SNAKE_CASE | kebab-case | snake_case
    .toml: kebab-case | snake_case

  # ============================================================
  # .github 目录
  # ============================================================
  .github:
    .yml: kebab-case
    .yaml: kebab-case
    .json: kebab-case
    .md: SCREAMING_SNAKE_CASE | kebab-case | snake_case

  # ============================================================
  # scripts 目录（PowerShell 脚本）
  # ============================================================
  scripts:
    .ps1: kebab-case

  # ============================================================
  # src-tauri 目录（Rust 命名规范：snake_case）
  # ============================================================
  src-tauri:
    .rs: snake_case
    .toml: kebab-case | snake_case
    .json: kebab-case | snake_case

# ============================================================
# 忽略路径
# ============================================================
ignore:
  - .git
  - node_modules
  - dist
  - src-tauri/target
